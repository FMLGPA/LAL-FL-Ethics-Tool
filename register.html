<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Legal Authority Lab FL Bar AI Ethics Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a; --dark: #111111; --card: #181818;
  --border: #2a2a2a; --border2: #333333;
  --pink: #E8197A; --pink-dim: rgba(232,25,122,0.12);
  --orange: #FF5A1F; --white: #ffffff;
  --gray-400: #888888; --gray-500: #666666;
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.7);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: radial-gradient(ellipse at 70% 20%, rgba(232,25,122,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(255,90,31,0.06) 0%, transparent 50%),
              var(--black);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 20px;
  max-width: 520px; width: 100%;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(232,25,122,0.1);
  overflow: hidden;
  animation: rise 0.45s cubic-bezier(0.16,1,0.3,1);
}
@keyframes rise { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
.card-head {
  background: var(--black);
  padding: 32px 40px 26px;
  border-bottom: 2px solid var(--pink);
}
.eyebrow {
  font-family: 'Outfit', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--pink); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.eyebrow::before { content:''; width:22px; height:1px; background:var(--pink); display:inline-block; }
.card-head h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 24px; font-weight: 700;
  color: var(--white); line-height: 1.3;
  margin-bottom: 6px; letter-spacing: -0.3px;
}
.card-head p { color: var(--gray-400); font-size: 13.5px; font-weight: 300; line-height: 1.6; }
.card-body { padding: 32px 40px 36px; }
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--gray-400); margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14.5px; color: var(--white);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  outline: none;
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(232,25,122,0.1);
}
.field input::placeholder { color: var(--gray-500); }
.agree-row {
  display: flex; align-items: flex-start;
  gap: 12px; margin: 22px 0;
  cursor: pointer;
}
.agree-row input[type="checkbox"] {
  width: 17px; height: 17px;
  margin-top: 2px; flex-shrink: 0;
  accent-color: var(--pink); cursor: pointer;
}
.agree-row label {
  font-size: 13px; line-height: 1.7;
  color: rgba(255,255,255,0.6); cursor: pointer;
}
.agree-row label a { color: var(--pink); text-decoration: none; }
.submit-btn {
  width: 100%; padding: 15px;
  background: var(--pink); color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  border: none; border-radius: var(--radius);
  cursor: pointer; transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(232,25,122,0.35);
}
.submit-btn:hover { background: #f01e85; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.45; pointer-events: none; }
.msg {
  padding: 14px 16px; border-radius: 8px;
  font-size: 13.5px; line-height: 1.7;
  margin-top: 16px; display: none;
}
.msg.success {
  background: rgba(30,180,100,0.1);
  border: 1px solid rgba(30,180,100,0.3);
  color: #5eda9e;
}
.msg.error {
  background: rgba(232,25,122,0.08);
  border: 1px solid rgba(232,25,122,0.25);
  color: rgba(255,150,180,0.9);
}
.footer-note {
  font-size: 11.5px; color: var(--gray-500);
  text-align: center; margin-top: 20px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="eyebrow">Legal Authority Lab</div>
    <h1>Request Access</h1>
    <p>FL Bar AI Ethics Research Tool · For Florida-licensed attorneys only</p>
  </div>
  <div class="card-body">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Jane Smith" autocomplete="name">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="jane@yourfirm.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Florida Bar Number</label>
      <input type="text" id="barNumber" placeholder="e.g. 123456" maxlength="8" inputmode="numeric">
    </div>
    <label class="agree-row">
      <input type="checkbox" id="agreed">
      <label for="agreed">I am a Florida-licensed attorney in good standing with The Florida Bar. I understand this tool is for general ethics research only, does not provide legal advice, and that I must not enter client-identifying information.</label>
    </label>
    <button class="submit-btn" id="submit-btn" onclick="register()">Request My Access Link</button>
    <div class="msg" id="msg"></div>
    <p class="footer-note">Your unique access link will be emailed to you immediately.<br>This tool is restricted to Florida Bar members only.</p>
  </div>
</div>

<script>
async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const barNumber = document.getElementById('barNumber').value.trim();
  const agreed = document.getElementById('agreed').checked;
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');

  msg.style.display = 'none';

  if (!name || !email || !barNumber || !agreed) {
    showMsg('error', 'Please complete all fields and check the agreement box.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, barNumber, agreed })
    });

    const data = await res.json();

    if (data.success) {
      showMsg('success', '✓ Registration complete. Check your email for your personal access link — it may take a minute to arrive. Check your spam folder if you don\'t see it.');
      btn.textContent = 'Access Link Sent';
      document.getElementById('name').disabled = true;
      document.getElementById('email').disabled = true;
      document.getElementById('barNumber').disabled = true;
      document.getElementById('agreed').disabled = true;
    } else {
      showMsg('error', data.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Request My Access Link';
    }
  } catch (err) {
    showMsg('error', 'Network error. Please check your connection and try again.');
    btn.disabled = false;
    btn.textContent = 'Request My Access Link';
  }
}

function showMsg(type, text) {
  const msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') register();
});
</script>
</body>
</html>
